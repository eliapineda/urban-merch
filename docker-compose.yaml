version: "3.8"
services:
  app:
      build:
        context: .
        dockerfile: docker/php/Dockerfile
      container_name: urbn_app
      # SIN PORTS AQUÍ
      volumes:
        - .:/var/www/html
      networks:
        - urbn_net
  db:
    image: mysql:8.0
    container_name: urbn_db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=tienda_db
      - MYSQL_USER=tienda_user
      - MYSQL_PASSWORD=tienda_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # - ./database.sql:/docker-entrypoint-initdb.d/01-database.sql:ro
    networks:
      - urbn_net
  n8n:
    image: n8nio/n8n:latest
    container_name: urbn_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=Europe/Madrid
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin123
    volumes:
      - n8n_data:/home/node/.local/share/n8n
    networks:
      - urbn_net
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: urbn_phpmyadmin
    restart: unless-stopped
    environment:
      - PMA_HOST=db
      - PMA_USER=tienda_user
      - PMA_PASSWORD=tienda_pass
    ports:
      - "8081:80"
    depends_on:
      - db
    networks:
      - urbn_net

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - urbn_net
volumes:
  db_data:
  n8n_data:
networks:
  urbn_net:
    driver: bridge
